#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart. You can check the default values/options here:
# https://github.com/bjw-s/helm-charts/blob/main/charts/library/common/values.yaml
#

config:
  # THIS IS NECESSARY FOR BOT TO START, FILL THIS FIELD
  # token:
  admin_list:
    - 0
  open_lobby: true
  enable_translations: false
  workers: 32
  default_game mode: classic
  waiting_time: 60
  time_removal_after_skip: 10
  min_fast_turn_time: 15
  min_players: 2
  bot_action_delay: 4

defaultPodOptions:
  securityContext:
    fsGroup: 65534
    fsGroupChangePolicy: Always

configMaps:
  config:
    enabled: true
    suffix: config
    data: {}
      # config.json is autogenerated from config object above

secrets:
  envs:
    suffix: envs
    stringData: {}
      # TOKEN is got from config.token value

controllers:
  main:
    type: statefulset
    containers:
      main:
        image:
          repository: ghcr.io/jh0ker/mau_mau_bot
          pullPolicy: Always
          tag: latest
        envFrom:
          - secret: envs
        securityContext:
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534

persistence:
  config:
    type: configMap
    identifier: config
    globalMounts:
      - path: /app/config.json
        readOnly: true
        subPath: config.json
  data:
    type: persistentVolumeClaim
    suffix: data
    accessMode: ReadWriteOnce
    retain: true
    globalMounts:
      - path: /app/data/
        readOnly: false
    size: 100Mi
